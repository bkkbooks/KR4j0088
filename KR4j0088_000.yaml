body:
  text: 顧曲雜言詞曲類五南北曲之屬提要臣等謹案顧曲雜言一卷明沈德符撰德符有飛鳬語略已著録此書專論雜劇南曲北曲之别其論元人未滅南宋以前以雜劇試士核以元史選舉志絶無影響乃委巷之鄙談其論遼史樂志有大食調曲譜訛作大石因有小石調配之其意以大食為國名如龜兹之類不知自宋已有此名故王圭詩號至寶丹秦觀詩號小石調不由曲譜之訛其論五六工尺上四合凡一為出於宋樂書亦未免附㑹考南曲無凡一上字有髙下之分宋時樂歌未必分南北曲也如此之類間有小疵然如論北曲以絃索為主板有定制南曲笙笛不妨長短其聲以就板立說頗為精確其推原諸劇牌名自金元以至明代縷晰條分徴引亦為該洽詞曲雖伎藝之流然亦樂中之末派故唐人樂府雜録之類至今尚傳存此一編以考南北曲之崖略未始非博物之一端也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:09e33535c61272fb8e3509706314761346542ac0fcc809fc3e4ecb62638d11e2
